name: ci

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Prepare development build
        run: pnpm dev:prepare

      - name: Lint
        run: pnpm lint

      - name: Typecheck code
        run: pnpm typecheck

      - name: Test code
        run: pnpm test

      - name: Build packages
        run: pnpm build
